<!DOCTYPE html>
<html>
<head>
    <title>A Letter For You</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: linear-gradient(to right, #dbeafe, #93c5fd);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .letter {
            background: white;
            padding: 25px;
            max-width: 90%;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: left;
        }

        h1 {
            text-align: center;
            color: #2563eb;
        }

        p {
            font-size: 18px;
            color: #333;
            line-height: 1.8;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 12px 18px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1e40af;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            p {
                font-size: 19px;
            }
        }
    </style>
</head>

<body>

<div class="letter">
    <h1>Hey...</h1>

    <p id="message">
        DEAR ANAMIKA <br><br>
        I made something for you.<br><br>
        Hope you'll like it....
    </p>

    <button onclick="startTyping()">PRESS OR CLICK</button>
</div>

<script>
const text = `I don’t know the perfect words, even though I am good with words.
You are someone who was a very, very dear friend to me.

But it was too late for me to realize that my feelings for you
were far more superior, special, terrifying, yet at the same time
unforgettable and mesmerizing.

After reading this much, I am sure you have realized it,
but still, I should say it...

I LIKE YOU

I don't expect an answer, nor a reply.
I just don't want to remain a single sentence in your life,
when you are a full-stacked library in my heart.

Hmm... well then,
I hope you stay happy, prosperous, and cheerful.
I don’t even know whether you will read this or forget about this haha.

My every poem, shayari, and quote was dedicated to you,
and to my future self.

God really played with me well, I guess...

Bringing me near to those people
who will never become mine.

Shayari ki tarah isko bhi ek secret hi rakhna... okay?

I hate sympathy.

Well then, it's hard to say but...

GOODBYE, MAJDOOR!

— From the CLASS TOPPER ️`;

let i = 0;

function startTyping() {
    document.getElementById("message").innerHTML = "";
    typeWriter();
}

function typeWriter() {
    if (i < text.length) {
        if (text.charAt(i) === "\n") {
            document.getElementById("message").innerHTML += "<br><br>";
        } else {
            document.getElementById("message").innerHTML += text.charAt(i);
        }
        i++;
        setTimeout(typeWriter, 55); // speed (lower = faster)
    }
}
</script>

</body>
</html>
