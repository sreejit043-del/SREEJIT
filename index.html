<!DOCTYPE html>
<html>
<head>
    <title>A Letter For You</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: linear-gradient(to right, #dbeafe, #93c5fd);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .letter {
            background: white;
            padding: 25px;
            max-width: 90%;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: left;
        }

        h1 {
            text-align: center;
            color: #2563eb;
        }

        p {
            font-size: 18px;
            color: #333;
            line-height: 1.8;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 12px 18px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1e40af;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            p {
                font-size: 19px;
            }
        }
    </style>
</head>

<body>

<div class="letter">
    <h1>Hey...</h1>

    <p id="message">
        DEAR ANAMIKA <br><br>
        I made something for you.<br><br>
        Hope you'll like it....
    </p>

    <button onclick="showLetter()">PRESS OR CLICK</button>
</div>

<script>
function showLetter() {
    document.getElementById("message").innerHTML = `
        I don’t know the perfect words, even though I am good with words.<br>
        You are someone who was a very, very dear friend to me.<br><br>

        But it was too late for me to realize that my feelings for you<br>
        were far more superior, special, terrifying, yet at the same time<br>
        unforgettable and mesmerizing.<br><br>

        After reading this much, I am sure you have realized it,<br>
        but still, I should say it...<br><br>

        <b>I LIKE YOU</b><br><br>

        I don't expect an answer, nor a reply.<br>
        I just don't want to remain a single sentence in your life,<br>
        when you are a full-stacked library in my heart.<br><br>

        Hmm... well then,<br>
        I hope you stay happy, prosperous, and cheerful.<br>
        I don’t even know whether you will read this or forget about this haha.<br><br>

        My every poem, shayari, and quote was dedicated to you,<br>
        and to my future self.<br><br>

        God really played with me well, I guess...<br><br>

        Shayari ki tarah isko bhi ek secret hi rakhna... okay?<br><br>

        I hate sympathy.<br><br>

        Well then, it's hard to say but...<br><br>

        <b>GOODBYE, MAJDOOR!</b><br><br>

        One last line aapke naam :-<br><br>

        To you, 10 yrs after...<br>
        Who are you smiling beside,<br>
        Are you happy?<br><br>

        — From the CLASS TOPPER
    `;

    // 🔥 This line hides the button after clicking
    document.querySelector("button").style.display = "none";
}
</script>
</body>
</html>
